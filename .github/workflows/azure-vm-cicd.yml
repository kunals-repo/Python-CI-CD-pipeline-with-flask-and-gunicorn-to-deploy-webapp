name: Deploy python app on azure vm

on:
   push:
   workflow_dispatch: 


jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11]

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lint Checks
        run: flake8 app/main.py
        

      - name: Run Unit Tests
        run: PYTHONPATH=. pytest tests/test_main.py
         

  deploy:
    name: Deploy to azure vm
    runs-on: ubuntu-latest
    needs: build-and-test


    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy Files to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.VM_USERNAME }}/app"

      - name: Execute Deployment Commands on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VM_USERNAME }}/app

            chmod +x scripts/deploy.sh

            ./scripts/deploy.sh
